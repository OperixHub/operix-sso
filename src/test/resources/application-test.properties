# Configuração para testes (unit/integration sem Postgres real)
spring.datasource.url=jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Flyway permanece desligado no perfil test (os testes com Postgres ligam via override)
spring.flyway.enabled=false

# Logs persistidos (valores baixos pra testes locais)
app.logs.persistence.queue-capacity=200
app.logs.persistence.batch-size=50
app.logs.persistence.flush-interval-ms=50

logging.level.org.springframework.security=DEBUG
logging.level.com.operix.auth=DEBUG
